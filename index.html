<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Maintenance</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:420px;
    padding:40px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
    color:#333;
}

p{
    color:#666;
    margin:20px 0 30px;
}

button{
    background:#0078d7;
    color:white;
    border:none;
    padding:14px 35px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005ea6;
}
</style>

</head>
<body>

<div class="container">
    <h2>System Maintenance</h2>
    <p>A required security update is available.</p>

</html>
