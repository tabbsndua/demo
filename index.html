<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            width:420px;
            padding:40px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        h2{
            margin-top:0;
            color:#333;
        }

        p{
            color:#666;
            margin:20px 0 30px;
            font-size:16px;
        }

        button{
            background:#0078D7;
            color:white;
            border:none;
            padding:14px 35px;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#005ea6;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>System Maintenance</h2>

    <p>A required security update is available.</p>

    <button onclick="updateNow()">Update Now</button>
</div>

<script>
function updateNow(){
    // Replace this with your own demonstration URL
    window.location.href = "https://example.com";
}
</script>

</body>
</html>
